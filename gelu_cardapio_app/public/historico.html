<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Cardápios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Base styles */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f7f7;
            color: #333;
        }
        .container {
            max-width: 1200px;
        }
        .section-card {
            background-color: white;
            padding: 1.5rem;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        /* Primary Button */
        .btn-primary {
            background-color: #4f46e5;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            transition: background-color 0.3s;
        }
        .btn-primary:hover {
            background-color: #4338ca;
        }
        /* Success Button (for 'Repetir Semana') */
        .btn-success {
            background-color: #10b981;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            transition: background-color 0.3s;
        }
        .btn-success:hover {
            background-color: #059669;
        }
        /* Histórico Specific Styles */
        .historico-semana {
            margin-bottom: 1.5rem;
            padding: 1rem;
            border: 1px solid #ddd;
            border-radius: 0.5rem;
            background-color: #fcfcfc;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .historico-semana h4 {
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #4f46e5;
        }
        .historico-dias-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 0.5rem;
            font-size: 0.875rem;
        }
        .historico-dia-item {
            padding: 0.5rem;
            background-color: #f3f4f6;
            border-radius: 0.375rem;
        }
        .historico-dia-item strong {
            display: block;
            color: #1f2937;
        }
        .historico-dia-item span {
            color: #4b5563;
        }
    </style>
</head>
<body class="p-4 sm:p-8">
    <div class="container mx-auto space-y-8">
        <header class="text-center">
            <h1 class="text-4xl font-extrabold text-gray-900 mb-2">Histórico Semanal de Cardápios</h1>
            <p class="text-gray-600">Reveja seus cardápios anteriores e repita uma semana inteira.</p>
            <nav class="mt-4 flex justify-center space-x-4">
                <a href="index.html" class="text-indigo-600 hover:text-indigo-800 font-semibold border-b-2 border-transparent hover:border-indigo-600 transition">Cardápio Atual</a>
                <a href="receitas.html" class="text-indigo-600 hover:text-indigo-800 font-semibold border-b-2 border-transparent hover:border-indigo-600 transition">Gerenciar Receitas</a>
            </nav>
        </header>

        <!-- Seção: Histórico -->
        <section class="section-card">
            <h2 class="text-2xl font-bold mb-4 text-indigo-700">Semanas Anteriores</h2>
            <div id="historico-status" class="mb-4 font-semibold"></div>
            <div id="historico-lista">
                <!-- Histórico é renderizado aqui -->
            </div>
        </section>

    </div>

    <script src="app.js"></script>
</body>
</html>
