services:
  postgres:
    image: postgres:16-alpine
    container_name: nutrifam-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nutrifam}
      POSTGRES_USER: ${POSTGRES_USER:-nutrifam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nutrifam}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nutrifam} -d ${POSTGRES_DB:-nutrifam}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: nutrifam-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-nutrifam}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-nutrifam123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./data/minio:/data

  backend:
    build:
      context: ../backend
    container_name: nutrifam-backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-nutrifam}
      DATABASE_USERNAME: ${POSTGRES_USER:-nutrifam}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-nutrifam}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
    container_name: nutrifam-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      - backend
