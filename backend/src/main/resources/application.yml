spring:
  application:
    name: gelu-menu-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/gelu_menu}
    username: ${DATABASE_USERNAME:gelu_menu}
    password: ${DATABASE_PASSWORD:gelu_menu}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

gelu:
  auth:
    jwt:
      secret: ${JWT_SECRET:gelu-menu-local-development-secret-change-me}
      access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:15m}
      refresh-token-ttl: ${JWT_REFRESH_TOKEN_TTL:30d}
