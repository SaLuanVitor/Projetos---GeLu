spring:
  application:
    name: gelu-menu-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/gelu_menu}
    username: ${DATABASE_USERNAME:gelu_menu}
    password: ${DATABASE_PASSWORD:gelu_menu}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: ${MEDIA_MAX_FILE_SIZE:5MB}
      max-request-size: ${MEDIA_MAX_REQUEST_SIZE:6MB}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

gelu:
  auth:
    expose-password-reset-token: ${EXPOSE_PASSWORD_RESET_TOKEN:true}
    password-reset-token-ttl: ${PASSWORD_RESET_TOKEN_TTL:30m}
    jwt:
      secret: ${JWT_SECRET:gelu-menu-local-development-secret-change-me}
      access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:15m}
      refresh-token-ttl: ${JWT_REFRESH_TOKEN_TTL:30d}
  storage:
    endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
    access-key: ${STORAGE_ACCESS_KEY:gelu_menu}
    secret-key: ${STORAGE_SECRET_KEY:gelu_menu123}
    bucket: ${STORAGE_BUCKET:gelu-menu-media}
    proxy-base-path: ${STORAGE_PROXY_BASE_PATH:/api/v1/recipes}
    max-image-size-bytes: ${STORAGE_MAX_IMAGE_SIZE_BYTES:5242880}
