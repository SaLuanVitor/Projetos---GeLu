spring:
  application:
    name: nutrifam-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/nutrifam}
    username: ${DATABASE_USERNAME:nutrifam}
    password: ${DATABASE_PASSWORD:nutrifam}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
